<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Single-theme by design: the night ward IS the product's world. Declaring
         it keeps UA chrome (form controls, scrollbars, mobile status bar) from
         leaking light into the room. -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#10141f" />
    <meta
      name="description"
      content="SALUS Zero — a clinical training simulator and decision-support companion for medicine where nothing is available: no CT, no ultrasound, no surgeon in the building. You decide with what the clinic actually has."
    />
    <!-- Data-URI favicon: the sodium lamp over the night ward. Inline on
         purpose — the demo must stay fully self-contained/offline. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23131826'/%3E%3Ccircle cx='32' cy='27' r='16' fill='%23e5a34f' fill-opacity='0.25'/%3E%3Ccircle cx='32' cy='27' r='11' fill='%23e5a34f'/%3E%3Crect x='16' y='48' width='32' height='4' rx='2' fill='%234a5268'/%3E%3C/svg%3E"
    />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://saluszero.com/" />
    <!-- Link unfurls (Slack/Discord/X): the signature moment — ordering the CT
         the hospital does not have — is the card. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SALUS Zero" />
    <meta property="og:title" content="SALUS Zero — training for medicine where nothing is available" />
    <meta
      property="og:description"
      content="A clinical training simulator and decision-support companion for medicine where nothing is available: no CT, no ultrasound, no surgeon in the building. You decide with what the clinic actually has."
    />
    <meta property="og:url" content="https://saluszero.com/" />
    <meta property="og:image" content="https://saluszero.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SALUS Zero — training for medicine where nothing is available" />
    <meta name="twitter:image" content="https://saluszero.com/og.png" />
    <title>SALUS Zero — training for medicine where nothing is available</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
